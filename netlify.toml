[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/tools"
  to = "/tools/"
  status = 301
  force = true

[[redirects]]
  from = "/guides"
  to = "/guides/"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/guides/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/guides/:splat"
  status = 301

[[redirects]]
  from = "/pricing"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/features"
  to = "/tools/"
  status = 301

[[redirects]]
  from = "/login"
  to = "/"
  status = 301

[[redirects]]
  from = "/signup"
  to = "/"
  status = 301
